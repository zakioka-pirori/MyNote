site_name: コンピュータサイエンス自習教科書
site_description: 文系卒・現役エンジニアのための CS 学部相当の自習教科書
site_url: https://zakioka-pirori.github.io/MyNote/
repo_url: https://github.com/zakioka-pirori/MyNote
repo_name: zakioka-pirori/MyNote
edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ダークモードへ切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ライトモードへ切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zakioka-pirori/MyNote

nav:
  - ホーム: index.md
  - カリキュラム概観: cs-curriculum.md
  - 第1層 数学・論理基礎:
      - textbook/01-foundations/01-discrete-math.md
      - textbook/01-foundations/02-linear-algebra.md
      - textbook/01-foundations/03-calculus.md
      - textbook/01-foundations/04-probability-statistics.md
      - textbook/01-foundations/05-logic.md
  - 第2層 コア科目:
      - textbook/02-core/01-programming-paradigms.md
      - textbook/02-core/02-data-structures-algorithms.md
      - textbook/02-core/03-theory-of-computation.md
      - textbook/02-core/04-computer-architecture.md
      - textbook/02-core/05-operating-systems.md
      - textbook/02-core/06-networking.md
      - textbook/02-core/07-databases.md
      - textbook/02-core/08-compilers.md
      - textbook/02-core/09-software-engineering.md
  - 第3層 応用・発展:
      - textbook/03-applied/01-security.md
      - textbook/03-applied/02-distributed-systems.md
      - textbook/03-applied/03-ai-ml.md
      - textbook/03-applied/04-hci.md
      - textbook/03-applied/05-graphics.md
  - 第4層 選択・先端:
      - textbook/04-electives/01-overview.md
